<!DOCTYPE html>
<html>
<head>
  <title>Training Portal</title>
  <style>
    body { display: flex; font-family: Arial; }
    #sidebar { width: 30%; padding: 10px; }
    #content { width: 70%; }
    iframe { width: 100%; height: 500px; }
    li { cursor: pointer; margin: 8px 0; }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>Course Content</h3>

  <h4>Day 1</h4>
  <ul>
    <li onclick="loadContent('video1')">🎥 Video</li>
    <li onclick="loadContent('ppt1')">📊 PPT</li>
    <li onclick="loadContent('notes1')">📝 Notes</li>
  </ul>

</div>

<div id="content">
  <iframe id="viewer"></iframe>
</div>

<script>

const content = {
  video1: "YOUR_VIDEO_PREVIEW_LINK",
  ppt1: "YOUR_PPT_LINK",
  notes1: "YOUR_DOC_LINK"
};

function loadContent(id) {
  document.getElementById("viewer").src = content[id];
}

</script>

</body>
</html>
